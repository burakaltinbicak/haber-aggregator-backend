<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Agregatörü</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-inner">
            <h1>📰 Haber Agregatörü</h1>
            <div id="source-buttons"></div>
            <button id="crawl-btn">🔄 Şimdi Çek</button>
        </div>
    </header>


    <div id="stats-bar" class="stats-bar">
        <div class="stat-card">
            <span class="stat-value" id="stat-total">-</span>
            <span class="stat-label">Toplam Haber</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="stat-sources">-</span>
            <span class="stat-label">Kaynak</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="stat-24h">-</span>
            <span class="stat-label">Son 24 Saat</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="stat-last">-</span>
            <span class="stat-label">Son Crawl</span>
        </div>
    </div>

    <main id="news-grid"></main>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <span id="modal-close">&times;</span>
            <h2 id="modal-title"></h2>
            <img id="modal-image" src="" alt="">
            <div id="modal-body"></div>
            <a id="modal-link" href="" target="_blank">Orijinal Habere Git →</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
